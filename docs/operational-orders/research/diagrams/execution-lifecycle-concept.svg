  <rect x="60" y="120" width="800" height="90" fill="#f8fafc" stroke="#cbd5e1" rx="5"/>
  <text x="80" y="142" class="n">Orthogonal: signing a document creates obligations but does not complete them</text>
  <text x="80" y="162" class="s">" ę@8:07 2ABC?05B 2 A8;C A> 4=O ?>4?8A0=8OĽ  document effect, triggers execution start</text>
  <text x="80" y="180" class="s">" Obligations may be permanent (regime_maintenance), periodic (monthly ), or event-bounded (travel)</text>
  <text x="80" y="198" class="s">" Corpus rarely states obligation closure  ęclosed by controllerĽ is organizational practice, not text</text>

