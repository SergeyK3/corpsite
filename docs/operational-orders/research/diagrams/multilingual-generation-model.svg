<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Segoe UI, Arial, sans-serif">
  <defs><style>.t{font:700 18px sans-serif;fill:#0f172a}.b{fill:#f8fafc;stroke:#334155;rx:6}.l{font:600 12px sans-serif;fill:#0f172a}.m{font:11px sans-serif;fill:#475569}.c{fill:#eff6ff;stroke:#2563eb}.s{fill:#ecfdf5;stroke:#059669}</style></defs>
  <text x="450" y="28" text-anchor="middle" class="t">Multilingual Generation Model</text>
