<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Segoe UI, Arial, sans-serif">
  <defs><style>.t{font:700 18px sans-serif;fill:#0f172a}.b{fill:#f8fafc;stroke:#334155;rx:6}.l{font:600 12px sans-serif;fill:#0f172a}.m{font:11px sans-serif;fill:#475569}.a{fill:#eff6ff;stroke:#2563eb}.b2{fill:#fff7ed;stroke:#ea580c}</style></defs>
  <text x="450" y="28" text-anchor="middle" class="t">Symmetric vs Asymmetric Generation Models</text>
  <rect x="40" y="50" width="400" height="380" class="b a"/>
  <text x="240" y="80" text-anchor="middle" class="l">Model A  Symmetric semantic-first (target)</text>
  <rect x="120" y="100" width="240" height="36" class="b"/><text x="240" y="123" text-anchor="middle" class="m">Language-independent Semantic Model</text>
  <line x1="180" y1="136" x2="140" y2="170" stroke="#334155"/><line x1="300" y1="136" x2="340" y2="170" stroke="#334155"/>
  <rect x="80" y="170" width="120" height="32" class="b"/><text x="140" y="190" text-anchor="middle" class="m">RU Renderer</text>
  <rect x="280" y="170" width="120" height="32" class="b"/><text x="340" y="190" text-anchor="middle" class="m">KK Renderer</text>
  <text x="240" y="230" text-anchor="middle" class="m">Parallel generation from same facts</text>
  <text x="240" y="250" text-anchor="middle" class="m">Personnel Orders target pattern</text>
  <text x="240" y="280" text-anchor="middle" class="m">Corpus support: partial</text>
  <text x="240" y="300" text-anchor="middle" class="m">Best for: scenario templates P0</text>
  <rect x="460" y="50" width="400" height="380" class="b b2"/>
  <text x="660" y="80" text-anchor="middle" class="l">Model B  Asymmetric RU-first (observed)</text>
  <rect x="560" y="100" width="200" height="32" class="b"/><text x="660" y="120" text-anchor="middle" class="m">Semantic + RU effective draft</text>
  <line x1="660" y1="132" x2="660" y2="160" stroke="#334155"/>
  <rect x="560" y="160" width="200" height="32" class="b"/><text x="660" y="180" text-anchor="middle" class="m">Translation workflow</text>
  <line x1="660" y1="192" x2="660" y2="220" stroke="#334155"/>
  <rect x="560" y="220" width="200" height="32" class="b"/><text x="660" y="240" text-anchor="middle" class="m">KK effective draft</text>
  <line x1="660" y1="252" x2="660" y2="280" stroke="#334155"/>
  <rect x="560" y="280" width="200" height="32" class="b"/><text x="660" y="300" text-anchor="middle" class="m">Bilingual reconciliation</text>
  <text x="660" y="340" text-anchor="middle" class="m">Corpus support: probable</text>
  <text x="660" y="360" text-anchor="middle" class="m">75 kk-after-ru layouts; RU dominance</text>
  <text x="660" y="380" text-anchor="middle" class="m">Best for: legacy free-text, human translation</text>
  <text x="450" y="460" text-anchor="middle" class="m">Hybrid architecture recommended: A target + B editorial mode with staleness tracking</text>
</svg>
