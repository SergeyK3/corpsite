<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Segoe UI, Arial, sans-serif">
  <defs><style>.t{font:700 16px sans-serif;fill:#0f172a}.p{fill:#f0fdf4;stroke:#16a34a;rx:6}.f{fill:#eff6ff;stroke:#2563eb;rx:6}.o{fill:#fff7ed;stroke:#ea580c;rx:6}.x{font:600 11px sans-serif;fill:#0f172a}.m{font:10px sans-serif;fill:#475569}</style></defs>
  <text x="450" y="22" text-anchor="middle" class="t">Incremental Migration  No Big-Bang Rewrite</text>
  <rect x="30" y="45" width="120" height="50" class="p"/><text x="90" y="68" text-anchor="middle" class="x">Phase 0</text><text x="90" y="82" text-anchor="middle" class="m">Ratify</text>
  <rect x="170" y="45" width="120" height="50" class="f"/><text x="230" y="68" text-anchor="middle" class="x">Phase 1</text><text x="230" y="82" text-anchor="middle" class="m">Contracts</text>
  <rect x="310" y="45" width="120" height="50" class="f"/><text x="370" y="68" text-anchor="middle" class="x">Phase 2</text><text x="370" y="82" text-anchor="middle" class="m">Editorial</text>
  <rect x="450" y="45" width="120" height="50" class="f"/><text x="510" y="68" text-anchor="middle" class="x">Phase 3</text><text x="510" y="82" text-anchor="middle" class="m">Lifecycle</text>
  <rect x="590" y="45" width="120" height="50" class="o"/><text x="650" y="68" text-anchor="middle" class="x">Phase 4</text><text x="650" y="82" text-anchor="middle" class="m">OO MVP</text>
  <rect x="730" y="45" width="140" height="50" class="o"/><text x="800" y="68" text-anchor="middle" class="x">Phase 56</text><text x="800" y="82" text-anchor="middle" class="m">Proj+Conv</text>
  <line x1="150" y1="70" x2="170" y2="70" stroke="#334155"/><line x1="290" y1="70" x2="310" y2="70" stroke="#334155"/><line x1="430" y1="70" x2="450" y2="70" stroke="#334155"/><line x1="570" y1="70" x2="590" y2="70" stroke="#334155"/><line x1="710" y1="70" x2="730" y2="70" stroke="#334155"/>
  <rect x="60" y="130" width="780" height="100" class="p"/>
  <text x="450" y="155" text-anchor="middle" class="x">Personnel Orders MVP (production)  remains operational throughout</text>
  <text x="80" y="175" class="m">Adapters · feature flags · shared contracts extracted behind existing routes</text>
  <text x="80" y="193" class="m">API compatibility · stored orders readable · PDF/HTML reproducible · lifecycle semantics unchanged</text>
  <text x="80" y="211" class="m">Rollback boundary: each phase proves PO behavior unchanged before next phase</text>
  <rect x="60" y="260" width="360" height="110" class="f"/>
  <text x="240" y="285" text-anchor="middle" class="x">Extract to Shared Core</text>
  <text x="75" y="305" class="m">editorial · lifecycle audit · archive</text>
  <text x="75" y="321" class="m">validation framework · print VM · PDF renderer</text>
  <text x="75" y="337" class="m">generation orchestration shell</text>
  <rect x="480" y="260" width="360" height="110" class="o"/>
  <text x="660" y="285" text-anchor="middle" class="x">Add Operational Orders (parallel)</text>
  <text x="495" y="305" class="m">P0 scenarios · OO registries · no full PO refactor required</text>
  <text x="495" y="321" class="m">shared shell · separate specialization module</text>
  <text x="495" y="337" class="m">execution runtime deferred to Phase 5</text>
  <text x="450" y="385" text-anchor="middle" class="m">First WP after OP-RES-006: UDE-000 Architecture Ratification</text>
