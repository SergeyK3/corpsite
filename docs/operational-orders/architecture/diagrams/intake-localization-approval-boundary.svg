<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="Segoe UI, Arial, sans-serif">
  <defs><style>.t{font:700 14px sans-serif;fill:#0f172a}.i{fill:#fff7ed;stroke:#ea580c;rx:8}.l{fill:#ecfdf5;stroke:#059669;rx:8}.a{fill:#eff6ff;stroke:#2563eb;rx:8}.x{font:600 11px sans-serif;fill:#0f172a}.m{font:9px sans-serif;fill:#475569}</style></defs>
  <text x="400" y="18" text-anchor="middle" class="t">Intake · Localization · Approval Boundary</text>
  <rect x="30" y="40" width="220" height="240" class="i"/>
  <text x="140" y="65" text-anchor="middle" class="x">Draft Intake</text>
  <text x="45" y="88" class="m">Accept submitted text</text>
  <text x="45" y="102" class="m">Provenance capture</text>
  <text x="45" y="116" class="m">I001I026 validation</text>
  <text x="45" y="130" class="m">Clarification required</text>
  <text x="45" y="144" class="m">NOT ready for sign</text>
  <text x="45" y="165" class="x">Ends when:</text>
  <text x="45" y="179" class="m">Official draft workspace</text>
  <text x="45" y="193" class="m">created with effective text</text>
  <rect x="290" y="40" width="220" height="240" class="l"/>
  <text x="400" y="65" text-anchor="middle" class="x">Localization</text>
  <text x="305" y="88" class="m">Translation request</text>
  <text x="305" y="102" class="m">KK completion</text>
  <text x="305" y="116" class="m">BC001BC025 checks</text>
  <text x="305" y="130" class="m">Staleness CURRENT</text>
  <text x="305" y="144" class="m">Localization review</text>
  <text x="305" y="165" class="x">Blocks READY if:</text>
  <text x="305" y="179" class="m">STALE / REVIEW_REQUIRED</text>
  <text x="305" y="193" class="m">mandatory locale (no waiver)</text>
  <rect x="550" y="40" width="220" height="240" class="a"/>
  <text x="660" y="65" text-anchor="middle" class="x">Approval / Sign</text>
  <text x="565" y="88" class="m">Content confirmation</text>
  <text x="565" y="102" class="m">Approver visas</text>
  <text x="565" y="116" class="m">READY_FOR_SIGNATURE</text>
  <text x="565" y="130" class="m">SIGNED / REGISTERED</text>
  <text x="565" y="144" class="m">Immutable snapshot</text>
  <text x="565" y="165" class="x">Requires:</text>
  <text x="565" y="179" class="m">Reconciled bilingual pkg</text>
  <text x="565" y="193" class="m">Author content confirm</text>
  <line x1="250" y1="160" x2="290" y2="160" stroke="#334155" stroke-width="2"/><line x1="510" y1="160" x2="550" y2="160" stroke="#334155" stroke-width="2"/>
  <text x="400" y="300" text-anchor="middle" class="m">Document status stays DRAFT through intake/localization; editorial substates are derived conditions + audit events</text>
</svg>
