<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Segoe UI, Arial, sans-serif">
  <defs><style>.t{font:700 17px sans-serif;fill:#0f172a}.c{fill:#f8fafc;stroke:#64748b;rx:6}.g{fill:#ecfdf5;stroke:#059669;rx:6}.b{fill:#eff6ff;stroke:#2563eb;rx:6}.l{font:600 12px sans-serif;fill:#0f172a}.m{font:10px sans-serif;fill:#475569}</style></defs>
