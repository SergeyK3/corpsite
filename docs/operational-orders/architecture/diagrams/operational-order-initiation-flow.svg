<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" font-family="Segoe UI, Arial, sans-serif">
  <defs><style>.t{font:700 15px sans-serif;fill:#0f172a}.b{fill:#eff6ff;stroke:#2563eb;rx:6}.g{fill:#f0fdf4;stroke:#16a34a;rx:6}.o{fill:#fff7ed;stroke:#ea580c;rx:6}.x{font:600 10px sans-serif;fill:#0f172a}.m{font:9px sans-serif;fill:#475569}</style></defs>
  <text x="450" y="18" text-anchor="middle" class="t">Operational Order Initiation Flow (OP-RES-006A)</text>
  <rect x="10" y="35" width="75" height="40" class="o"/><text x="47" y="52" text-anchor="middle" class="x">Business</text><text x="47" y="64" text-anchor="middle" class="x">Initiator</text>
  <rect x="95" y="35" width="75" height="40" class="o"/><text x="132" y="52" text-anchor="middle" class="x">Content</text><text x="132" y="64" text-anchor="middle" class="x">Author</text>
  <rect x="180" y="35" width="75" height="40" class="o"/><text x="217" y="58" text-anchor="middle" class="x">Draft Submit</text>
  <rect x="265" y="35" width="65" height="40" class="g"/><text x="297" y="58" text-anchor="middle" class="x">HR Intake</text>
