  <line x1="85" y1="55" x2="95" y2="55" stroke="#334155"/><line x1="170" y1="55" x2="180" y2="55" stroke="#334155"/><line x1="255" y1="55" x2="265" y2="55" stroke="#334155"/><line x1="330" y1="55" x2="340" y2="55" stroke="#334155"/><line x1="420" y1="55" x2="430" y2="55" stroke="#334155"/><line x1="500" y1="55" x2="510" y2="55" stroke="#334155"/><line x1="595" y1="55" x2="605" y2="55" stroke="#334155"/><line x1="670" y1="55" x2="680" y2="55" stroke="#334155"/><line x1="735" y1="55" x2="745" y2="55" stroke="#334155"/>
  <text x="450" y="105" text-anchor="middle" class="m">Confirmed: Initiator/Author often dept head · HR = Document Operator (not default content author)</text>
  <text x="450" y="120" text-anchor="middle" class="m">Interview required: approval sequence · KK mandatory policy · content confirmation rules</text>
  <rect x="150" y="135" width="600" height="55" class="o"/>
