<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" font-family="Segoe UI, Arial, sans-serif">
  <defs><style>.t{font:700 16px sans-serif;fill:#0f172a}.k{fill:#fef3c7;stroke:#d97706;rx:8}.b{fill:#eff6ff;stroke:#2563eb;rx:6}.u{fill:#f0fdf4;stroke:#16a34a;rx:6}.d{fill:#fef2f2;stroke:#dc2626;rx:6}.x{font:600 11px sans-serif;fill:#0f172a}.m{font:10px sans-serif;fill:#475569}</style></defs>
  <text x="440" y="22" text-anchor="middle" class="t">Target Bounded Contexts  Modular Monolith</text>
  <rect x="280" y="40" width="320" height="70" class="k"/>
  <text x="440" y="65" text-anchor="middle" class="x">Shared Kernel: Document Core + Editorial + Lifecycle contracts</text>
  <text x="290" y="85" class="m">Not a separate deployable service</text>
  <rect x="40" y="130" width="180" height="55" class="b"/><text x="130" y="152" text-anchor="middle" class="x">Document Mgmt</text><text x="50" y="170" class="m">CRUD · journal · archive</text>
  <rect x="240" y="130" width="180" height="55" class="b"/><text x="330" y="152" text-anchor="middle" class="x">Generation</text><text x="250" y="170" class="m">scenario · render · validate</text>
  <rect x="440" y="130" width="180" height="55" class="b"/><text x="530" y="152" text-anchor="middle" class="x">Localization</text><text x="450" y="170" class="m">RU/KK · staleness</text>
  <rect x="640" y="130" width="200" height="55" class="b"/><text x="740" y="152" text-anchor="middle" class="x">Rendering</text><text x="650" y="170" class="m">HTML · PDF · future DOCX</text>
  <rect x="120" y="210" width="200" height="55" class="u"/><text x="220" y="232" text-anchor="middle" class="x">Personnel Domain</text><text x="130" y="250" class="m">HR events · apply</text>
  <rect x="340" y="210" width="200" height="55" class="u"/><text x="440" y="232" text-anchor="middle" class="x">Operational Domain</text><text x="350" y="250" class="m">obligations · scenarios</text>
  <rect x="560" y="210" width="200" height="55" class="b"/><text x="660" y="232" text-anchor="middle" class="x">Org &amp; Parties</text><text x="570" y="250" class="m">role-first resolution</text>
  <rect x="280" y="290" width="320" height="55" class="d"/>
  <text x="440" y="312" text-anchor="middle" class="x">Execution Management (downstream)</text>
  <text x="290" y="330" class="m">Task engine · separate contour · consumes projection descriptors</text>
  <text x="440" y="355" text-anchor="middle" class="m">No microservices until proven scale need · premature service split is a non-goal</text>
</svg>
