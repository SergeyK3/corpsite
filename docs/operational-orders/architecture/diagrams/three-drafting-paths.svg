  <defs><style>.t{font:700 15px sans-serif;fill:#0f172a}.a{fill:#eff6ff;stroke:#2563eb;rx:8}.b{fill:#ecfdf5;stroke:#059669;rx:8}.c{fill:#fff7ed;stroke:#ea580c;rx:8}.x{font:600 11px sans-serif;fill:#0f172a}.m{font:9px sans-serif;fill:#475569}.p{font:700 10px sans-serif;fill:#ea580c}</style></defs>
