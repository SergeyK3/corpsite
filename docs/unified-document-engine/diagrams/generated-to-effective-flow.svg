  <defs><style>.t{font:700 17px sans-serif;fill:#0f172a}.n{fill:#fff;stroke:#94a3b8;rx:6}.sem{fill:#d1fae5;stroke:#059669;rx:6}.gen{fill:#dbeafe;stroke:#2563eb;rx:6}.man{fill:#fef3c7;stroke:#d97706;rx:6}.eff{fill:#e0e7ff;stroke:#4f46e5;rx:6}.off{fill:#f3e8ff;stroke:#7c3aed;rx:6}.sig{fill:#fce7f3;stroke:#db2777;rx:6}.m{font:9px sans-serif;fill:#475569}.l{font:600 11px sans-serif;fill:#0f172a}</style></defs>
