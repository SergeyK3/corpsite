<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Segoe UI, Arial, sans-serif">
  <defs><style>.t{font:700 17px sans-serif;fill:#0f172a}.m{fill:#fef3c7;stroke:#d97706;rx:12}.i{fill:#ecfdf5;stroke:#059669;rx:12}.f{fill:#fee2e2;stroke:#dc2626;rx:12}.l{font:600 11px sans-serif;fill:#0f172a}.s{font:9px sans-serif;fill:#475569}</style></defs>
  <text x="350" y="22" text-anchor="middle" class="t">Signed Snapshot Boundary (ADR-UDE-009)</text>
  <rect x="80" y="50" width="180" height="50" class="m"/><text x="170" y="72" text-anchor="middle" class="l">DRAFT baseline v1</text><text x="170" y="88" text-anchor="middle" class="s">mutable</text>
  <rect x="300" y="50" width="180" height="50" class="m"/><text x="390" y="72" text-anchor="middle" class="l">READY</text><text x="390" y="88" text-anchor="middle" class="s">read-only pre-sign</text>
  <rect x="260" y="140" width="180" height="60" class="f"/><text x="350" y="165" text-anchor="middle" class="l">SIGNED</text><text x="350" y="182" text-anchor="middle" class="s">Signed Immutable Snapshot</text>
  <line x1="170" y1="100" x2="320" y2="140" stroke="#d97706"/><line x1="390" y1="100" x2="370" y2="140" stroke="#d97706"/>
  <rect x="200" y="230" width="300" height="110" class="i"/>
  <text x="350" y="252" text-anchor="middle" class="l">Snapshot contents</text>
  <text x="220" y="272" class="s">DocumentId | version | kind | metadata</text>
  <text x="220" y="288" class="s">RU/KK effective | structure | items | attachments</text>
  <text x="220" y="304" class="s">signer snapshot | reconciliation | content_hash</text>
  <text x="220" y="320" class="s">renderer/template refs | created_at</text>
  <rect x="520" y="230" width="150" height="60" fill="#f8fafc" stroke="#94a3b8" rx="8"/>
  <text x="595" y="252" text-anchor="middle" class="l">PDF artifact</text>
  <text x="535" y="272" class="s">separate immutable</text>
  <text x="535" y="286" class="s">snapshot text wins</text>
  <line x1="440" y1="285" x2="520" y2="260" stroke="#94a3b8" stroke-dasharray="4,3"/>
  <text x="350" y="350" text-anchor="middle" class="s">Not at Activation (UDE-004)  legal immutability only at SIGNED</text>
