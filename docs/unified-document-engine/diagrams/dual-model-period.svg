<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" font-family="Segoe UI, Arial, sans-serif">
  <defs><style>.t{font:700 17px sans-serif;fill:#0f172a}.po{fill:#fef3c7;stroke:#d97706;rx:10}.oo{fill:#e0e7ff;stroke:#4f46e5;rx:10}.sh{fill:#ecfdf5;stroke:#059669;rx:10}.m{font:9px sans-serif;fill:#475569}.l{font:600 11px sans-serif;fill:#0f172a}</style></defs>
  <text x="350" y="22" text-anchor="middle" class="t">Controlled Dual Model Period</text>
  <rect x="60" y="60" width="250" height="220" class="po"/>
  <text x="185" y="82" text-anchor="middle" class="l">PO Legacy-Native</text>
