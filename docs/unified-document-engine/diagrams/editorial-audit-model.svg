<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="Segoe UI, Arial, sans-serif">
  <defs><style>.t{font:700 17px sans-serif;fill:#0f172a}.d{fill:#fef3c7;stroke:#d97706;rx:6}.e{fill:#eff6ff;stroke:#2563eb;rx:6}.l{fill:#ecfdf5;stroke:#059669;rx:6}.m{font:9px sans-serif;fill:#475569}.lb{font:600 11px sans-serif;fill:#0f172a}</style></defs>
  <text x="400" y="22" text-anchor="middle" class="t">Editorial Audit Model (UDE-003)</text>
  <rect x="40" y="50" width="200" height="250" class="d"/><text x="140" y="72" text-anchor="middle" class="lb">Draft Audit</text><text x="50" y="92" class="m">DRAFT_SUBMITTED</text><text x="50" y="108" class="m">INTAKE_ACCEPTED</text><text x="50" y="124" class="m">CLARIFICATION_*</text><text x="50" y="140" class="m">Scope: intake + early workspace</text><text x="50" y="170" class="m">Ends: promotion (frozen)</text>
  <rect x="280" y="50" width="240" height="250" class="e"/><text x="400" y="72" text-anchor="middle" class="lb">Editorial Audit</text><text x="290" y="92" class="m">EDITORIAL_EDIT</text><text x="290" y="108" class="m">REGENERATED</text><text x="290" y="124" class="m">OVERRIDE_SAVED / CLEARED</text><text x="290" y="140" class="m">TRANSLATION_ADDED</text><text x="290" y="156" class="m">LOCALIZATION_REVIEWED</text><text x="290" y="172" class="m">CONTENT_CONFIRMED</text><text x="290" y="188" class="m">OFFICIAL_PACKAGE_ASSEMBLED</text><text x="290" y="220" class="m">Workspace + Document DRAFT</text>
  <rect x="560" y="50" width="200" height="250" class="l"/><text x="660" y="72" text-anchor="middle" class="lb">Lifecycle Audit</text><text x="570" y="92" class="m">RECORD_CREATED</text><text x="570" y="108" class="m">READY_FOR_SIGNATURE</text><text x="570" y="124" class="m">SIGNED / REGISTERED</text><text x="570" y="140" class="m">VOIDED / ARCHIVED</text><text x="570" y="170" class="m">Starts: DOCUMENT_PROMOTED</text><text x="570" y="186" class="m">Scope: Document aggregate</text>
  <line x1="240" y1="175" x2="280" y2="175" stroke="#334155"/><line x1="520" y1="175" x2="560" y2="175" stroke="#059669"/>
  <text x="400" y="330" text-anchor="middle" class="m">Three append-only streams  never merged. Summary link at promotion.</text>
  <text x="400" y="350" text-anchor="middle" class="m">Editorial Audit continues on Document until lifecycle lock</text>
</svg>
