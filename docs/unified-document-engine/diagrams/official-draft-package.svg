<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 420" font-family="Segoe UI, Arial, sans-serif">
  <defs><style>.t{font:700 17px sans-serif;fill:#0f172a}.ws{fill:#fef3c7;stroke:#d97706;rx:6}.pkg{fill:#e0e7ff;stroke:#4f46e5;rx:6}.doc{fill:#eff6ff;stroke:#2563eb;rx:6}.l{font:600 11px sans-serif;fill:#0f172a}.m{font:9px sans-serif;fill:#475569}</style></defs>
