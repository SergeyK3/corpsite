<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="Segoe UI, Arial, sans-serif">
  <defs><style>.t{font:700 17px sans-serif;fill:#0f172a}.done{fill:#d1fae5;stroke:#059669;rx:8}.next{fill:#dbeafe;stroke:#2563eb;rx:8}.fut{fill:#f1f5f9;stroke:#64748b;rx:8}.oo{fill:#e0e7ff;stroke:#4f46e5;rx:8}.m{font:9px sans-serif;fill:#475569}.l{font:600 10px sans-serif;fill:#0f172a}</style></defs>
