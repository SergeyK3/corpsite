<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520" font-family="Segoe UI, Arial, sans-serif">
  <defs><style>.t{font:700 17px sans-serif;fill:#0f172a}.d{fill:#eff6ff;stroke:#2563eb;rx:4}.v{fill:#ecfdf5;stroke:#059669;rx:4}.r{fill:#fef3c7;stroke:#d97706;rx:4}.p{fill:#f3e8ff;stroke:#7c3aed;rx:4}.l{font:600 10px sans-serif;fill:#0f172a}.m{font:9px sans-serif;fill:#475569}</style></defs>
  <text x="350" y="22" text-anchor="middle" class="t">Future Shared Package Structure (UDE-001)</text>
  <text x="350" y="40" text-anchor="middle" class="m">Logical only  no files created in UDE-001</text>
  <rect x="250" y="55" width="200" height="28" class="d"/><text x="350" y="73" text-anchor="middle" class="l">shared/</text>
  <rect x="30" y="100" width="120" height="36" class="d"/><text x="90" y="122" text-anchor="middle" class="l">document/</text>
  <rect x="30" y="145" width="120" height="24" class="v"/><text x="90" y="161" text-anchor="middle" class="m">core metadata structure</text>
  <rect x="165" y="100" width="120" height="36" class="d"/><text x="225" y="122" text-anchor="middle" class="l">editorial/</text>
  <rect x="165" y="145" width="120" height="24" class="v"/><text x="225" y="161" text-anchor="middle" class="m">generated effective override</text>
  <rect x="300" y="100" width="120" height="36" class="d"/><text x="360" y="122" text-anchor="middle" class="l">localization/</text>
  <rect x="300" y="145" width="120" height="24" class="v"/><text x="360" y="161" text-anchor="middle" class="m">locale provenance staleness</text>
  <rect x="435" y="100" width="120" height="36" class="d"/><text x="495" y="122" text-anchor="middle" class="l">generation/</text>
  <rect x="435" y="145" width="120" height="24" class="v"/><text x="495" y="161" text-anchor="middle" class="m">orchestration idempotency</text>
  <rect x="570" y="100" width="100" height="36" class="d"/><text x="620" y="122" text-anchor="middle" class="l">lifecycle/</text>
  <rect x="30" y="200" width="120" height="36" class="d"/><text x="90" y="222" text-anchor="middle" class="l">validation/</text>
  <rect x="165" y="200" width="120" height="36" class="d"/><text x="225" y="222" text-anchor="middle" class="l">projection/</text>
  <rect x="300" y="200" width="120" height="36" class="d"/><text x="360" y="222" text-anchor="middle" class="l">attachment/</text>
  <rect x="435" y="200" width="120" height="36" class="d"/><text x="495" y="222" text-anchor="middle" class="l">audit/</text>
  <rect x="570" y="200" width="100" height="36" class="d"/><text x="620" y="222" text-anchor="middle" class="l">party/</text>
  <rect x="100" y="270" width="500" height="36" class="r"/><text x="350" y="292" text-anchor="middle" class="l">contracts/ + value-objects/ + registries/</text>
  <rect x="100" y="320" width="240" height="36" class="p"/><text x="220" y="342" text-anchor="middle" class="l">specializations/personnel/</text>
  <rect x="360" y="320" width="240" height="36" class="p"/><text x="480" y="342" text-anchor="middle" class="l">specializations/operational/</text>
  <text x="350" y="390" text-anchor="middle" class="m">specializations/ plug into registries  never imported by shared/</text>
  <text x="350" y="410" text-anchor="middle" class="m">contracts/ = conceptual interfaces (DocumentContract, LocalizationContract, ...)</text>
  <text x="350" y="430" text-anchor="middle" class="m">value-objects/ = DocumentId, LocaleCode, DraftingPath, TextSourceType, ...</text>
  <text x="350" y="450" text-anchor="middle" class="m">registries/ = extension point resolution (kind, item, renderer, validation, projection)</text>
  <text x="350" y="490" text-anchor="middle" class="m">Implementation mapping begins UDE-003  UDE-001 defines structure only</text>
</svg>
