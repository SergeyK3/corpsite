<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Segoe UI, Arial, sans-serif">
  <defs><style>.t{font:700 17px sans-serif;fill:#0f172a}.p{fill:#f1f5f9;stroke:#64748b;rx:8}.a{fill:#dbeafe;stroke:#2563eb}.b{fill:#ecfdf5;stroke:#059669}.c{fill:#e0e7ff;stroke:#4f46e5}.d{fill:#fef3c7;stroke:#d97706}.e{fill:#fee2e2;stroke:#dc2626}.f{fill:#fce7f3;stroke:#db2777}.m{font:9px sans-serif;fill:#475569}.l{font:600 10px sans-serif;fill:#0f172a}</style></defs>
  <text x="360" y="22" text-anchor="middle" class="t">Incremental Extraction Phases A-F</text>
  <rect x="40" y="50" width="100" height="55" class="a"/><text x="90" y="72" text-anchor="middle" class="l">A</text><text x="90" y="88" text-anchor="middle" class="m">Baseline</text>
  <rect x="150" y="50" width="100" height="55" class="b"/><text x="200" y="72" text-anchor="middle" class="l">B</text><text x="200" y="88" text-anchor="middle" class="m">Contracts</text>
  <rect x="260" y="50" width="100" height="55" class="b"/><text x="310" y="72" text-anchor="middle" class="l">C</text><text x="310" y="88" text-anchor="middle" class="m">Read Adapters</text>
  <rect x="370" y="50" width="100" height="55" class="c"/><text x="420" y="72" text-anchor="middle" class="l">D</text><text x="420" y="88" text-anchor="middle" class="m">OO Native</text>
  <rect x="480" y="50" width="100" height="55" class="d"/><text x="530" y="72" text-anchor="middle" class="l">E</text><text x="530" y="88" text-anchor="middle" class="m">Shared Svcs</text>
  <rect x="590" y="50" width="100" height="55" class="f"/><text x="640" y="72" text-anchor="middle" class="l">F</text><text x="640" y="88" text-anchor="middle" class="m">PO Conv</text>
  <line x1="140" y1="77" x2="150" y2="77" stroke="#64748b"/><line x1="250" y1="77" x2="260" y2="77" stroke="#64748b"/>
  <line x1="360" y1="77" x2="370" y2="77" stroke="#64748b"/><line x1="470" y1="77" x2="480" y2="77" stroke="#64748b"/>
  <line x1="580" y1="77" x2="590" y2="77" stroke="#64748b" stroke-dasharray="4,3"/>
  <rect x="60" y="140" width="600" height="250" class="p"/>
  <text x="360" y="162" text-anchor="middle" class="l">WP Mapping</text>
  <text x="80" y="185" class="m">A: UDE-006 baseline + characterization inventory</text>
  <text x="80" y="205" class="m">B: UDE-007 shared runtime contracts (first code  no behavior change)</text>
  <text x="80" y="225" class="m">C: UDE-008 read-only PO adapters + harness parity</text>
  <text x="80" y="245" class="m">D: OO-IMP-001..005 on shared core; PO unchanged</text>
  <text x="80" y="265" class="m">E: UDE-009 editorial/locale shared services</text>
  <text x="80" y="285" class="m">F: PO-CONV-001 optional write-path (ratified separate WP)</text>
  <text x="80" y="315" class="l">Principle: Preserve behavior first</text>
  <text x="80" y="335" class="m">No big-bang rewrite | Phase F optional | Rollback per phase</text>
  <text x="80" y="365" class="m">F dashed: requires compatibility proof from C+D</text>
</svg>
