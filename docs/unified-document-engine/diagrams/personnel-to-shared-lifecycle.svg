<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Segoe UI, Arial, sans-serif">
  <defs><style>.t{font:700 17px sans-serif;fill:#0f172a}.po{fill:#fef3c7;stroke:#d97706;rx:10}.sh{fill:#ecfdf5;stroke:#059669;rx:10}.ad{fill:#dbeafe;stroke:#2563eb;rx:10}.oo{fill:#e0e7ff;stroke:#4f46e5;rx:10}.l{font:600 11px sans-serif;fill:#0f172a}.m{font:9px sans-serif;fill:#475569}.a{fill:#d1fae5;stroke:#059669}.b{fill:#fef9c3;stroke:#ca8a04}.c{fill:#fecaca;stroke:#dc2626}.d{fill:#e2e8f0;stroke:#64748b}.e{fill:#fce7f3;stroke:#db2777}</style></defs>
  <text x="360" y="22" text-anchor="middle" class="t">Personnel Orders to Shared Lifecycle</text>
