<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" font-family="Segoe UI, Arial, sans-serif">
  <defs><style>.t{font:700 17px sans-serif;fill:#0f172a}.r{fill:#eff6ff;stroke:#2563eb;rx:8}.n{fill:#fff;stroke:#94a3b8;rx:4}.s{fill:#ecfdf5;stroke:#059669;rx:6}.d{fill:#fef2f2;stroke:#dc2626;rx:6;stroke-dasharray:4,3}.l{font:600 12px sans-serif;fill:#0f172a}.m{font:10px sans-serif;fill:#475569}</style></defs>
  <text x="410" y="24" text-anchor="middle" class="t">UDE Shared Domain Model (UDE-001)</text>
  <rect x="280" y="40" width="260" height="420" class="r"/>
  <text x="410" y="65" text-anchor="middle" class="l">Document</text>
  <rect x="300" y="78" width="220" height="32" class="n"/><text x="410" y="98" text-anchor="middle" class="m">DocumentMetadata</text>
  <rect x="300" y="118" width="220" height="32" class="n"/><text x="410" y="138" text-anchor="middle" class="m">DocumentStructure / DocumentSection</text>
  <rect x="300" y="158" width="220" height="88" class="s"/>
  <text x="410" y="180" text-anchor="middle" class="l">OrderItem[]</text>
  <text x="310" y="200" class="m">ItemType + semantic_payload</text>
  <text x="310" y="216" class="m">ExecutionObligation[] ControlObligation</text>
  <text x="310" y="232" class="m">LocaleRepresentation (per block)</text>
  <rect x="300" y="254" width="220" height="72" class="s"/>
  <text x="410" y="274" text-anchor="middle" class="l">Text Layer</text>
  <text x="310" y="294" class="m">SubmittedText / GeneratedText</text>
  <text x="310" y="310" class="m">EffectiveText + TextProvenance</text>
  <rect x="300" y="334" width="220" height="32" class="n"/><text x="410" y="354" text-anchor="middle" class="m">AttachmentReference[]</text>
  <rect x="300" y="374" width="220" height="32" class="n"/><text x="410" y="394" text-anchor="middle" class="m">LifecycleState + DocumentAuditEvent[]</text>
  <rect x="300" y="414" width="220" height="32" class="n"/><text x="410" y="434" text-anchor="middle" class="m">ValidationResult</text>
  <rect x="40" y="180" width="200" height="120" class="s"/>
  <text x="140" y="205" text-anchor="middle" class="l">Value Objects</text>
  <text x="50" y="225" class="m">DocumentId, DocumentKind</text>
  <text x="50" y="241" class="m">LocaleCode, DraftingPath</text>
  <text x="50" y="257" class="m">PartyReference, DeadlineType</text>
  <text x="50" y="273" class="m">TextSourceType, ValidationCode</text>
  <rect x="580" y="180" width="200" height="120" class="d"/>
  <text x="680" y="205" text-anchor="middle" class="l">ExecutionProjection</text>
  <text x="590" y="225" class="m">Descriptor (downstream)</text>
  <text x="590" y="241" class="m">Not in aggregate</text>
  <text x="590" y="257" class="m">Eventual consistency OK</text>
  <line x1="520" y1="220" x2="580" y2="220" stroke="#dc2626" stroke-dasharray="4,3"/>
  <text x="410" y="490" text-anchor="middle" class="m">Shared contracts: shell + text + lifecycle. Specialized: semantic_payload, item types, scenarios.</text>
  <text x="410" y="508" text-anchor="middle" class="m">Authority: staged SoT  intake (submitted) ’ editorial (semantic+effective) ’ signed (immutable effective)</text>
</svg>
